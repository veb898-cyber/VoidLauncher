name: "Release"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      # Build the installer. We deliberately do NOT pass
      # `includeUpdaterJson: true` here: when that step's internal signing
      # fails (wrong TAURI_SIGNING_PRIVATE_KEY secret, etc.) tauri-action
      # silently skips attaching latest.json, and the auto-updater ends up
      # with a half-broken release. We do the signing ourselves in the next
      # step so any failure is loud and visible in the CI log.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: "VoidLauncher ${{ github.ref_name }}"
          releaseBody: "See the assets below for the installer."
          releaseDraft: false
          prerelease: false

      - name: Sign installer and generate latest.json
        shell: bash
        env:
          # Required for `gh release download` inside Actions.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAG: ${{ github.ref_name }}
        run: |
          # -x: print every command before it runs (so CI log shows where it died)
          set -euxo pipefail

          TAG_NO_V="${TAG#v}"
          INSTALLER="VoidLauncher_${TAG_NO_V}_x64-setup.exe"

          echo "Tag:           $TAG"
          echo "Installer:     $INSTALLER"
          echo "OS:            $(uname -a)"
          echo "Secret length: ${#TAURI_SIGNING_PRIVATE_KEY}"
          echo "Secret first 80 chars: ${TAURI_SIGNING_PRIVATE_KEY:0:80}"

          # ── 1. Normalize the secret to a base64 string the CLI expects ──
          #
          # The tauri CLI's `signer sign` does (in this order):
          #   1. read private_key string from `-k` / `TAURI_SIGNING_PRIVATE_KEY` env
          #      (or read file from `-f` / `TAURI_SIGNING_PRIVATE_KEY_PATH` env)
          #   2. base64-decode that string  →  raw minisign key text
          #   3. parse the minisign key text as a SecretKeyBox
          #   4. decrypt with password
          #
          # So the secret must be a base64-of-minisign-text. The locally-stored
          # file `~/.voidlauncher-update.key` is already in that form. But the
          # GitHub secret may have been pasted in as the raw minisign text
          # (multi-line) instead — handle both.
          #
          # `set -e` is suspended around the candidate test because we expect
          # one of the candidates to "fail" (return non-zero) — that's the
          # probe, not an error.
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > raw_secret.txt
          set +e
            base64 -d < raw_secret.txt > decoded.txt 2>/dev/null
            base64_rc=$?
          set -e

          if [ "$base64_rc" -eq 0 ] && head -1 decoded.txt | grep -q "^untrusted comment:"; then
            echo "Key format: base64-of-minisign-text (matches local key file)"
            KEY_FOR_CLI="$TAURI_SIGNING_PRIVATE_KEY"
          elif head -1 raw_secret.txt | grep -q "^untrusted comment:"; then
            echo "Key format: raw minisign text — base64-encoding for the CLI"
            KEY_FOR_CLI=$(base64 -w 0 < raw_secret.txt)
          else
            {
              echo "::error::TAURI_SIGNING_PRIVATE_KEY is neither base64-of-minisign-text nor raw minisign text."
              echo "::error::First 200 chars: ${TAURI_SIGNING_PRIVATE_KEY:0:200}"
            } >&2
            exit 1
          fi
          echo "Key for CLI length: ${#KEY_FOR_CLI}"

          # ── 2. Fetch the freshly-uploaded installer from the release ──
          gh release download "$TAG" --pattern "$INSTALLER" --output installer.exe
          ls -la installer.exe

          # ── 3. Sign the installer ──
          #
          # Real `tauri signer sign` flags (verified against tauri-cli source
          # `crates/tauri-cli/src/signer/sign.rs`):
          #   -k / --private-key       : base64 string of the key (NOT a file path)
          #   -f / --private-key-path  : file path whose contents are the base64 string
          #       --password           : key password (LONG FORM ONLY; no -w)
          #   <FILE>                   : file to sign (POSITIONAL; no -m)
          #   -t / --trusted-comment   : DOES NOT EXIST — that was the bug.
          #
          # Cleanest approach: pass everything via env vars (the CLI auto-reads
          # `TAURI_SIGNING_PRIVATE_KEY` and `TAURI_SIGNING_PRIVATE_KEY_PASSWORD`).
          # Use the local CLI from node_modules to avoid `npx` flakiness.
          if [ ! -x node_modules/.bin/tauri ]; then
            echo "::error::node_modules/.bin/tauri not found — was 'npm ci' skipped or did it fail?"
            ls -la node_modules/.bin/ 2>/dev/null | head -20 || true
            exit 1
          fi

          TAURI_SIGNING_PRIVATE_KEY="$KEY_FOR_CLI" \
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD="$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            node_modules/.bin/tauri signer sign installer.exe

          # ── 4. Extract the base64 signature from the .sig file ──
          #
          # `sign_file` in tauri-cli writes the base64-encoded SignatureBox to
          # `<file>.sig` (not `.minisig`). The file contains only the base64
          # string — no comments, no headers — so `cat` is enough.
          if [ ! -f installer.exe.sig ]; then
            echo "::error::Signing produced no .sig file"
            ls -la
            exit 1
          fi
          echo "::group::.sig contents (first 200 chars)"
          head -c 200 installer.exe.sig
          echo
          echo "::endgroup::"
          SIGNATURE=$(tr -d '\r\n ' < installer.exe.sig)
          echo "Signature length: ${#SIGNATURE}"
          if [ "${#SIGNATURE}" -lt 80 ]; then
            echo "::error::Signature looks too short / invalid"
            exit 1
          fi
          if ! printf '%s' "$SIGNATURE" | grep -qE '^[A-Za-z0-9+/=]+$'; then
            echo "::error::Signature is not valid base64"
            exit 1
          fi

          # ── 5. Generate latest.json ──
          URL="https://github.com/${{ github.repository }}/releases/download/$TAG/$INSTALLER"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > latest.json <<EOF
          {
            "version": "${TAG_NO_V}",
            "notes": "Release ${TAG}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIGNATURE}",
                "url": "${URL}"
              }
            }
          }
          EOF

          echo "::group::latest.json"
          cat latest.json
          echo "::endgroup::"

          # ── 6. Cleanup secrets & intermediates ──
          rm -f raw_secret.txt decoded.txt installer.exe installer.exe.sig

      - name: Commit latest.json to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git pull origin main --rebase --autostash
          git add latest.json
          git commit -m "chore: update latest.json for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin HEAD:main

name: "Release"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      # Build the installer. We deliberately do NOT pass
      # `includeUpdaterJson: true` here: when that step's internal signing
      # fails (wrong TAURI_SIGNING_PRIVATE_KEY secret, etc.) tauri-action
      # silently skips attaching latest.json, and the auto-updater ends up
      # with a half-broken release. We do the signing ourselves in the next
      # step so any failure is loud and visible in the CI log.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: "VoidLauncher ${{ github.ref_name }}"
          releaseBody: "See the assets below for the installer."
          releaseDraft: false
          prerelease: false

      - name: Sign installer and generate latest.json
        shell: bash
        env:
          # Required for `gh release download` inside Actions.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAG: ${{ github.ref_name }}
        run: |
          # -x: print every command before it runs (CI log will show exactly
          #     where the script died, which is what we need to debug).
          set -euxo pipefail

          TAG_NO_V="${TAG#v}"
          INSTALLER="VoidLauncher_${TAG_NO_V}_x64-setup.exe"
          KEY_FILE="secret.key"

          echo "Tag:           $TAG"
          echo "Installer:     $INSTALLER"
          echo "OS:            $(uname -a)"
          echo "Secret length: ${#TAURI_SIGNING_PRIVATE_KEY}"
          echo "Secret first 4 chars (hex): $(printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | head -c 4 | od -An -tx1 | tr -d ' \n')"

          # ── 1. Fetch the freshly-uploaded installer from the release ──
          gh release download "$TAG" --pattern "$INSTALLER" --output installer.exe
          ls -la installer.exe

          # ── 2. Materialize the minisign key file from the secret ──
          # The secret can be in one of two shapes:
          #   (a) the raw minisign key text (starts with "untrusted comment:")
          #   (b) base64-encoded text of the key file
          # Try (b) first; fall back to (a).
          # `set -e` is suspended for the candidate blocks because each of them
          # is allowed to "fail" (returns non-zero) when the candidate isn't the
          # right format.
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > raw.txt
          KEY_SOURCE="unknown"
          set +e
            base64 -d < raw.txt > "$KEY_FILE" 2>/dev/null
            base64_rc=$?
            if [ $base64_rc -eq 0 ] && head -1 "$KEY_FILE" | grep -q "^untrusted comment:"; then
              KEY_SOURCE="base64-decoded"
            elif head -1 raw.txt | grep -q "^untrusted comment:"; then
              cp raw.txt "$KEY_FILE"
              KEY_SOURCE="raw minisign text"
            fi
          set -e
          rm -f raw.txt

          if [ "$KEY_SOURCE" = "unknown" ]; then
            {
              echo "::error::TAURI_SIGNING_PRIVATE_KEY is neither a base64-encoded minisign key nor a raw minisign key file."
              echo "::error::The first 3 lines of the secret as it appears in the env var:"
              printf '%s\n' "$TAURI_SIGNING_PRIVATE_KEY" | head -3 | sed 's/^/::error::  /'
            } >&2
            exit 1
          fi
          echo "Key source: $KEY_SOURCE"
          ls -la "$KEY_FILE"
          head -2 "$KEY_FILE" | sed 's/^/key> /'

          # ── 3. Sign the installer ──
          # Prefer the locally-installed CLI (already in node_modules after
          # the `npm ci` in the previous step). Fall back to the network
          # download if the local binary is missing.
          if [ -x node_modules/.bin/tauri ]; then
            SIGN_CMD=(node_modules/.bin/tauri signer sign)
            echo "Using local tauri CLI at node_modules/.bin/tauri"
          else
            SIGN_CMD=(npx --yes @tauri-apps/cli signer sign)
            echo "Local tauri CLI not found, will use npx"
          fi
          "${SIGN_CMD[@]}" \
              -k "$KEY_FILE" \
              -w "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
              -m installer.exe \
              -t "VoidLauncher $TAG"

          # ── 4. Extract the base64 signature (last non-empty line of the .minisig) ──
          if [ ! -f installer.exe.minisig ]; then
            echo "::error::Signing produced no .minisig file"
            ls -la
            exit 1
          fi
          echo "::group::.minisig contents"
          cat installer.exe.minisig
          echo "::endgroup::"
          SIGNATURE=$(grep -v '^[[:space:]]*$' installer.exe.minisig | tail -1 | tr -d '\r\n')
          echo "Signature length: ${#SIGNATURE}"
          if [ ${#SIGNATURE} -lt 80 ]; then
            echo "::error::Signature looks too short / invalid"
            exit 1
          fi
          if ! printf '%s' "$SIGNATURE" | grep -qE '^[A-Za-z0-9+/=]+$'; then
            echo "::error::Signature is not valid base64"
            exit 1
          fi

          # ── 5. Generate latest.json ──
          URL="https://github.com/${{ github.repository }}/releases/download/$TAG/$INSTALLER"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > latest.json <<EOF
          {
            "version": "${TAG_NO_V}",
            "notes": "Release ${TAG}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIGNATURE}",
                "url": "${URL}"
              }
            }
          }
          EOF

          echo "::group::latest.json"
          cat latest.json
          echo "::endgroup::"

          # ── 6. Cleanup secrets & intermediates ──
          rm -f "$KEY_FILE" installer.exe installer.exe.minisig

      - name: Commit latest.json to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git pull origin main --rebase --autostash
          git add latest.json
          git commit -m "chore: update latest.json for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin HEAD:main

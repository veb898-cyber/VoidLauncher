<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoidLauncher</title>
    <meta name="description" content="VoidLauncher — A premium custom Minecraft launcher" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" />
    <style>
      body { background: hsl(230, 25%, 7%); margin: 0; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: hsl(230, 25%, 7%);
        transition: opacity 0.4s ease-out;
      }
      #splash.fade-out { opacity: 0; pointer-events: none; }
      #splash svg { width: 64px; height: 64px; margin-bottom: 24px; }
      #splash h1 {
        font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 700;
        background: linear-gradient(135deg, hsl(265, 100%, 65%), hsl(200, 100%, 60%));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        margin: 0 0 16px; letter-spacing: 2px;
      }
      .splash-spinner {
        width: 32px; height: 32px; border-radius: 50%;
        border: 3px solid rgba(255,255,255,0.1);
        border-top-color: hsl(265, 100%, 65%);
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <svg viewBox="0 0 24 24" fill="none" stroke="url(#splash-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <defs>
          <linearGradient id="splash-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="hsl(265, 100%, 65%)" />
            <stop offset="100%" stop-color="hsl(200, 100%, 60%)" />
          </linearGradient>
        </defs>
        <path d="M12 2L2 7l10 5 10-5-10-5z" />
        <path d="M2 17l10 5 10-5" />
        <path d="M2 12l10 5 10-5" />
      </svg>
      <h1>VOIDLAUNCHER</h1>
      <div class="splash-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
